{% extends "base.html" %}

{% block title %}Expenses Dashboard{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-100 flex flex-col items-center py-10">

  <!-- Heading -->
  <h2 class="text-3xl font-bold text-gray-800 mb-8">Expenses Dashboard</h2>

  <!-- Table Container -->
  <div class="bg-white shadow-xl rounded-2xl overflow-hidden w-11/12 lg:w-4/5">
    <table class="w-full border-collapse">
      <thead class="bg-blue-500 text-white">
        <tr>
          {% for col in columns %}
            <th class="py-3 px-4 text-left text-sm font-semibold uppercase tracking-wide">{{ col }}</th>
          {% endfor %}
        </tr>
      </thead>
      <tbody>
        {% for row in rows %}
          <tr class="border-b hover:bg-gray-50 transition">
            {% for cell in row %}
              <td class="py-3 px-4 text-gray-700">{{ cell }}</td>
            {% endfor %}
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

  <!-- Links -->
  <div class="mt-6 flex gap-6">
    <a href="{{ url_for('home') }}" 
       class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-5 py-2 rounded-lg shadow transition">
       ⬅ Back to Upload
    </a>
    <a href="{{ url_for('chat') }}" 
       class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2 rounded-lg shadow transition">
       💬 Go to Chat
    </a>
  </div>

</div>
{% endblock %}
