{% extends "base.html" %}

{% block title %}Chatbot - ExpenseBot{% endblock %}

{% block content %}
<!-- Full background with image -->
<div class="min-h-screen flex items-center justify-center relative">
  <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('/static/bgg.jpg');"></div>

  <!-- Chat Container -->
  <div class="relative z-10 w-4/6 bg-gray-200 rounded-2xl shadow-xl flex flex-col h-[85vh]">
    
    <!-- Chat Area -->
    <div class="flex-grow overflow-y-auto p-4 space-y-4">
      {% for entry in chat_history %}
        <!-- User Message -->
        <div class="flex justify-end">
          <div class="bg-blue-500 text-white px-4 py-2 rounded-2xl max-w-xs shadow">
            {{ entry.user }}
          </div>
        </div>
        <!-- Bot Reply -->
        <div class="flex justify-start">
          <div class="bg-white text-gray-800 px-4 py-2 rounded-2xl max-w-xs shadow">
            {{ entry.assistant }}
          </div>
        </div>
      {% endfor %}
    </div>

    <!-- Input Form -->
    <form method="post" class="flex p-4 border-t border-gray-300 bg-gray-300 rounded-b-2xl">
      <input 
        name="message"
        placeholder="Ask me something..."
        class="flex-grow border border-gray-400 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 focus:outline-none"
        required>
      <button type="submit" class="ml-2 bg-blue-500 text-white px-5 py-2 rounded-lg hover:bg-blue-600 transition shadow">
        Send
      </button>
    </form>
  </div>
</div>
{% endblock %}
